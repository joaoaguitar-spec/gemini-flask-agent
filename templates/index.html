<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAVISOL AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      color: #bbb;
      margin-bottom: 30px;
    }

    .modes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #2a2a2a;
      color: white;
      font-weight: bold;
    }

    .mode-btn.active {
      background: #ff4d6d;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      resize: vertical;
      font-size: 16px;
      box-sizing: border-box;
    }

    .send-wrap {
      margin-top: 15px;
      text-align: center;
    }

    button.send {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #00c896;
      color: #111;
      font-weight: bold;
      font-size: 16px;
    }

    .output {
      margin-top: 30px;
      background: #1b1b1b;
      padding: 20px;
      border-radius: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
      min-height: 80px;
    }

    .label {
      margin-top: 20px;
      color: #aaa;
      font-size: 14px;
    }

    .loading {
      color: #ffd166;
    }

    .error {
      color: #ff6b6b;
    }
  </style>
</head>

<body>

  <h1>JAVISOL AI TESTE NOVO</h1>

  <p class="subtitle">Roast interno • Press release absurdo • Simulador de ensaio</p>

  <div class="modes">
    <button class="mode-btn active" data-mode="roast">Roast</button>
    <button class="mode-btn" data-mode="press">Press Release</button>
    <button class="mode-btn" data-mode="rehearsal">Rehearsal Simulator</button>
  </div>

  <textarea id="message" placeholder="Ex: faz um roast ao nosso ensaio de ontem..."></textarea>

  <div class="send-wrap">
    <button class="send" onclick="sendMessage()">Gerar</button>
  </div>

  <div class="label">Resposta</div>
  <div id="output" class="output">Aqui vai aparecer o caos.</div>

  <script>
    let currentMode = "roast";

    const modeButtons = document.querySelectorAll(".mode-btn");
    modeButtons.forEach(button => {
      button.addEventListener("click", () => {
        modeButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentMode = button.dataset.mode;
      });
    });

    async function sendMessage() {
      const message = document.getElementById("message").value.trim();
      const output = document.getElementById("output");

      if (!message) {
        output.innerHTML = '<span class="error">Escreve alguma coisa primeiro.</span>';
        return;
      }

      output.innerHTML = '<span class="loading">A gerar resposta...</span>';

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message,
            mode: currentMode
          })
        });

        const data = await response.json();

        if (data.error) {
          output.innerHTML = `<span class="error">${data.error}</span>`;
        } else {
          output.textContent = data.reply;
        }
      } catch (error) {
        output.innerHTML = '<span class="error">Erro de ligação ao servidor.</span>';
      }
    }
  </script>

</body>
</html>
